<!DOCTYPE html>
<html>
    <head>
        <title>Web Page</title>
    </head>
    <body>
        <center>
            <h1>Internship Registration Form</h1>
          </center>
    <form>
        <table>
             <tr>
                <td>Enter Your Name :</td>
                <td><input type="text"required></td>
             </tr>

            <tr>
                <td>Enter Your Email :</td>
                <td><input type="email"required></td>
            </tr>
            <tr>
                <td>Preferred Internship Type:</td>
                <td><input type="radio"name="InternshipType">On-site
                    <input type="radio"name="InternshipType">Remote
                </td>
            </tr>
                <td>Internship Duration:</td>
                <td>
                    <select>
                        <option>6 weeks</option>
                        <option>3 months</option>
                    </select>
                </td>
            </tr>
               <tr>
                <td>Skills of Interest:</td>
                <td>
                    <input type="checkbox">Web Development
                    <input type="checkbox">Data Analysis
                    <input type="checkbox">Project Management
                </td>
               </tr>
               <tr>
                <td>Submit</td>
                <td><input type="Submit":></td>
               </tr>
            
            </table>
    </form>

    </body>
</html>
